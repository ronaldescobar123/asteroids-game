<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Asteroids</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.0/dist/pouchdb.min.js"></script>
  </head>
  <body>
    <div id="menu">
      <h1>ASTEROIDS</h1>
      <button id="start">INICIAR JUEGO</button>
      <button id="score">SCORE</button>

      <div id="score-modal" class="modal">
        <div class="modal-content">
          <h2>ESTADÍSTICAS</h2>
          <p>Juegos jugados: <span id="games-played">0</span></p>
          <p>Puntos acumulados: <span id="total-points">0</span></p>
          <button id="close-score">CERRAR</button>
        </div>
      </div>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <script type="module" src="controller.js"></script>
  </body>
</html>
